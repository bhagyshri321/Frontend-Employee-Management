<div class="login-page">
  <div class="form-container">

    <form (ngSubmit)="register()">
      <h2>Register</h2>

      <input 
        type="text" 
        [(ngModel)]="name" 
        name="name"
        placeholder="Username"
      ><br><br>

      <input 
        type="password" 
        [(ngModel)]="password" 
        name="password"
        placeholder="Password"
      ><br><br>

      <button type="submit">Register</button><br><br>

      <a [routerLink]="['/login']">
        Already have an account? Login
      </a>
    </form>

  </div>
</div>
